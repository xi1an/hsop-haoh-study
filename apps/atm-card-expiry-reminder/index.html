<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>吞卡作废提醒</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell" data-screen-label="ATM 吞卡作废提醒工具">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M4 7.5A2.5 2.5 0 0 1 6.5 5h11A2.5 2.5 0 0 1 20 7.5v9A2.5 2.5 0 0 1 17.5 19h-11A2.5 2.5 0 0 1 4 16.5v-9Z"></path>
              <path d="M4 10h16"></path>
              <path d="M8 15h4"></path>
            </svg>
          </div>
          <div>
            <h1>吞卡作废提醒</h1>
            <p>录入领取日期，自动计算截止和作废日</p>
          </div>
        </div>
        <button class="icon-button" id="refreshHolidays" type="button" title="刷新节假日数据" aria-label="刷新节假日数据">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M21 12a9 9 0 0 1-15.2 6.5"></path>
            <path d="M3 12A9 9 0 0 1 18.2 5.5"></path>
            <path d="M21 5v5h-5"></path>
            <path d="M3 19v-5h5"></path>
          </svg>
        </button>
      </header>

      <div class="desktop-grid">
        <section class="panel" aria-label="录入表单">
          <form id="expiryForm" class="form-grid">
            <div class="field">
              <label for="cardNumber">银行卡号（仅本次计算）</label>
              <input id="cardNumber" name="cardNumber" inputmode="numeric" autocomplete="off" placeholder="请输入完整银行卡号" required />
            </div>

            <div class="field">
              <label for="startDate">吞卡领取日期</label>
              <input id="startDate" name="startDate" type="date" required />
            </div>

            <div class="field-row">
              <div class="field">
                <label for="limitDays">超过期限</label>
                <input id="limitDays" name="limitDays" type="number" min="1" max="999" step="1" value="10" required />
              </div>
              <div class="field">
                <span class="label-text">期限类型</span>
                <div class="segmented" role="tablist" aria-label="期限类型">
                  <button type="button" data-unit="workday" class="active">工作日</button>
                  <button type="button" data-unit="natural">自然日</button>
                </div>
              </div>
            </div>

            <button class="switch-row" id="includeStartSwitch" type="button" aria-pressed="false">
              <div>
                <strong>是否包含当天</strong>
                <span id="includeStartCopy">默认从领取日期次日开始计算</span>
              </div>
              <span class="switch" aria-hidden="true"></span>
            </button>

            <button class="primary-button" type="submit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M5 12h14"></path>
                <path d="M12 5v14"></path>
              </svg>
              仅计算本次
            </button>
          </form>

          <div id="message" class="message" role="status"></div>

          <div id="resultPanel" class="result-panel">
            <div class="result-grid">
              <div class="metric">
                <span>最后可处理日</span>
                <strong id="deadlineText">-</strong>
              </div>
              <div class="metric danger">
                <span>作废日</span>
                <strong id="voidDateText">-</strong>
              </div>
            </div>
            <div class="data-source">
              <div class="source-line">
                <span id="sourceStatus" class="status-dot warn">等待数据</span>
                <button id="manualRefresh" class="text-button" type="button">刷新</button>
              </div>
              <div id="sourceDetail">节假日数据用于判断工作日、节假日和调休上班日。</div>
            </div>
            <div class="result-actions">
              <button id="downloadCurrentCalendar" class="secondary-button" type="button">下载本次日历提醒</button>
            </div>
          </div>
        </section>

        <section>
          <div class="section-title">
            <h2>日期依据</h2>
            <button id="calendarToday" class="secondary-button" type="button">回到结果月</button>
          </div>
          <div class="panel">
            <div class="calendar-toolbar">
              <button id="prevMonth" class="icon-button" type="button" aria-label="上个月">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <path d="m15 18-6-6 6-6"></path>
                </svg>
              </button>
              <div id="calendarTitle" class="calendar-title">-</div>
              <button id="nextMonth" class="icon-button" type="button" aria-label="下个月">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <path d="m9 18 6-6-6-6"></path>
                </svg>
              </button>
            </div>
            <div id="calendarGrid" class="calendar-grid" aria-label="日期判断日历"></div>
            <div class="legend">
              <span><i class="green"></i>计入</span>
              <span><i class="amber"></i>周末/节假日</span>
              <span><i class="blue"></i>调休上班</span>
              <span><i class="green"></i>截止日</span>
              <span><i class="red"></i>作废日</span>
            </div>
            <ul id="basisList" class="basis-list">
              <li>录入信息后，这里会显示计算经过。</li>
            </ul>
          </div>

          <div class="privacy-panel">
            <strong>不保存历史记录</strong>
            <span>多人共用时，系统只显示本次计算结果，不保存每次登记的卡号和记录列表。</span>
          </div>
        </section>
      </div>

      <p class="footnote">
        工具不保存银行卡号或历史记录；节假日联网数据来自第三方接口，页面会显示数据状态，国务院未公布的未来调休不做预测。
      </p>
    </main>

    <script src="./remote-content.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
