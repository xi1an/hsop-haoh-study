<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HSOP 个人业务工具门户</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        --bg: #f7f8fb;
        --paper: #ffffff;
        --paper-soft: #fbfcfe;
        --ink: #111827;
        --muted: #647084;
        --line: #e2e7ef;
        --line-strong: #ccd4df;
        --red: #d7041f;
        --red-dark: #a90016;
        --red-soft: #fff0f2;
        --green: #138a4e;
        --green-soft: #eaf7ef;
        --amber: #9a6700;
        --amber-soft: #fff6df;
        --shadow: 0 18px 44px rgba(17, 24, 39, 0.08);
        --radius: 8px;
        --sidebar: 248px;
        --aside: 350px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(rgba(17, 24, 39, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(17, 24, 39, 0.035) 1px, transparent 1px),
          var(--bg);
        background-size: 32px 32px;
        color: var(--ink);
        font-family: -apple-system, "SF Pro Text", "PingFang SC", "Noto Sans SC",
          "Microsoft YaHei", sans-serif;
        font-size: 15px;
        line-height: 1.7;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      svg {
        display: block;
        width: 100%;
        height: 100%;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 2;
      }

      .app {
        min-height: 100vh;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 30;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        min-height: 72px;
        padding: 0 28px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(18px);
      }

      .brand {
        display: flex;
        align-items: baseline;
        gap: 10px;
        min-width: 210px;
      }

      .brand-code {
        color: var(--red);
        font-size: 28px;
        font-weight: 900;
        line-height: 1;
      }

      .brand-title {
        font-size: 22px;
        font-weight: 850;
        line-height: 1;
      }

      .topbar-center {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1;
      }

      .date-strip {
        display: flex;
        align-items: center;
        gap: 14px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
      }

      .date-strip strong {
        color: var(--ink);
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        min-width: 210px;
      }

      .icon-button,
      .ghost-button,
      .primary-button,
      .secondary-button,
      .nav-button,
      .text-button,
      .resource-button {
        border: 0;
        background: transparent;
      }

      .icon-button {
        display: inline-flex;
        width: 40px;
        height: 40px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        color: var(--muted);
        background: var(--paper);
      }

      .icon-button:hover,
      .icon-button:focus-visible {
        color: var(--red);
        border-color: rgba(215, 4, 31, 0.35);
        outline: none;
      }

      .icon-button svg {
        width: 20px;
        height: 20px;
      }

      .app-shell {
        display: grid;
        grid-template-columns: var(--sidebar) minmax(0, 1fr) var(--aside);
        gap: 18px;
        width: min(1500px, calc(100% - 32px));
        margin: 18px auto 36px;
      }

      .portal-shell {
        grid-template-columns: minmax(0, 1fr);
        width: min(1120px, calc(100% - 32px));
      }

      .sidebar,
      .right-rail,
      .main-panel {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.96);
      }

      .sidebar,
      .right-rail {
        position: sticky;
        top: 90px;
        align-self: start;
        max-height: calc(100vh - 112px);
        overflow: auto;
      }

      .sidebar {
        padding: 18px;
      }

      .profile-card {
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper-soft);
      }

      .profile-top {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .avatar {
        display: inline-flex;
        width: 42px;
        height: 42px;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        color: var(--paper);
        background: var(--red);
        font-weight: 900;
      }

      .profile-name {
        margin: 0;
        font-weight: 850;
        line-height: 1.3;
      }

      .profile-sub {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .progress-compact {
        display: grid;
        gap: 8px;
        margin-top: 16px;
      }

      .progress-line {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 750;
      }

      .progress-line strong {
        color: var(--red);
      }

      .bar {
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: #e9edf3;
      }

      .bar > span {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: var(--red);
        transition: width 0.25s ease;
      }

      .nav-section {
        display: grid;
        gap: 8px;
        margin-top: 18px;
      }

      .nav-button {
        display: grid;
        grid-template-columns: 22px 1fr auto;
        align-items: center;
        gap: 10px;
        min-height: 44px;
        padding: 0 10px;
        border-radius: var(--radius);
        color: var(--muted);
        font-weight: 800;
        text-align: left;
      }

      .nav-button:hover,
      .nav-button.active {
        color: var(--red);
        background: var(--red-soft);
      }

      .nav-button svg {
        width: 20px;
        height: 20px;
      }

      .nav-count {
        min-width: 26px;
        padding: 1px 8px;
        border-radius: 999px;
        background: var(--paper);
        color: var(--muted);
        font-size: 12px;
        text-align: center;
      }

      .sidebar-note {
        margin-top: 18px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.65;
      }

      .sidebar-note strong {
        display: block;
        margin-bottom: 5px;
        color: var(--ink);
        font-size: 14px;
      }

      .main-panel {
        min-height: calc(100vh - 108px);
        overflow: hidden;
      }

      .portal-main {
        min-height: auto;
      }

      .screen {
        display: grid;
        gap: 20px;
        padding: 24px;
      }

      .screen-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 24px;
      }

      .screen-kicker {
        margin: 0 0 5px;
        color: var(--red);
        font-size: 13px;
        font-weight: 850;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 8px;
        font-size: clamp(34px, 4vw, 56px);
        font-weight: 900;
        line-height: 1.08;
        text-wrap: pretty;
      }

      h2 {
        margin-bottom: 0;
        font-size: 24px;
        line-height: 1.25;
      }

      h3 {
        margin-bottom: 8px;
        font-size: 18px;
        line-height: 1.3;
      }

      .screen-copy {
        max-width: 690px;
        margin: 0;
        color: var(--muted);
        font-size: 16px;
      }

      .primary-button,
      .secondary-button,
      .ghost-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 42px;
        padding: 0 15px;
        border-radius: var(--radius);
        font-size: 14px;
        font-weight: 850;
        white-space: nowrap;
      }

      .primary-button {
        color: var(--paper);
        background: var(--red);
      }

      .primary-button:hover,
      .primary-button:focus-visible {
        background: var(--red-dark);
        outline: none;
      }

      .secondary-button,
      .ghost-button {
        color: var(--ink);
        border: 1px solid var(--line);
        background: var(--paper);
      }

      .button-icon {
        width: 18px;
        height: 18px;
      }

      .hero-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .focus-card {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 210px;
        gap: 18px;
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper-soft);
      }

      .focus-card strong {
        color: var(--ink);
      }

      .focus-title {
        margin-bottom: 6px;
        font-size: 20px;
        font-weight: 900;
      }

      .focus-body {
        margin-bottom: 16px;
        color: var(--muted);
      }

      .focus-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .focus-image {
        overflow: hidden;
        min-height: 180px;
        border-radius: var(--radius);
        background: #edf1f6;
      }

      .focus-image img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .metric-card {
        min-height: 132px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
      }

      .metric-card span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .metric-card strong {
        display: block;
        margin-top: 9px;
        font-size: 32px;
        line-height: 1.08;
      }

      .metric-card small {
        color: var(--muted);
        font-weight: 750;
      }

      .section-block {
        display: grid;
        gap: 14px;
      }

      .block-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .block-head p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .task-board {
        display: grid;
        gap: 10px;
      }

      .task-card {
        display: grid;
        grid-template-columns: 28px minmax(0, 1fr) 116px 112px;
        gap: 12px;
        align-items: center;
        min-height: 70px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
      }

      .task-card:hover {
        border-color: rgba(215, 4, 31, 0.35);
      }

      .task-check {
        width: 18px;
        height: 18px;
        accent-color: var(--red);
      }

      .task-name {
        display: grid;
        gap: 3px;
        min-width: 0;
      }

      .task-name strong {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .task-name span {
        color: var(--muted);
        font-size: 13px;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 27px;
        width: fit-content;
        padding: 0 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 850;
      }

      .status-pill.waiting {
        color: var(--muted);
        background: #eef2f6;
      }

      .status-pill.doing {
        color: var(--amber);
        background: var(--amber-soft);
      }

      .status-pill.done {
        color: var(--green);
        background: var(--green-soft);
      }

      .progress-cell {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .progress-cell .bar {
        height: 7px;
      }

      .content-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .module-card,
      .plan-card,
      .review-card,
      .resource-row,
      .note-card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
      }

      .module-card {
        display: grid;
        gap: 14px;
        padding: 18px;
      }

      .module-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
      }

      .module-icon {
        display: inline-flex;
        width: 42px;
        height: 42px;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(215, 4, 31, 0.18);
        border-radius: var(--radius);
        color: var(--red);
        background: var(--red-soft);
      }

      .module-icon svg {
        width: 22px;
        height: 22px;
      }

      .module-card p {
        margin-bottom: 0;
        color: var(--muted);
      }

      .module-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .small-tag {
        display: inline-flex;
        min-height: 26px;
        align-items: center;
        padding: 0 9px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .right-rail {
        display: grid;
        gap: 14px;
        padding: 16px;
      }

      .rail-card {
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
      }

      .rail-card h3 {
        font-size: 16px;
      }

      .rail-list {
        display: grid;
        gap: 10px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .rail-list li {
        display: grid;
        gap: 3px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--line);
      }

      .rail-list li:last-child {
        padding-bottom: 0;
        border-bottom: 0;
      }

      .rail-list strong {
        font-size: 14px;
      }

      .rail-list span {
        color: var(--muted);
        font-size: 12px;
      }

      .quote-card {
        color: var(--paper);
        background: #151b2a;
      }

      .quote-card h3,
      .quote-card p {
        color: var(--paper);
      }

      .quote-card p {
        margin-bottom: 0;
        opacity: 0.78;
      }

      .weekly-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
      }

      .plan-card {
        display: grid;
        gap: 10px;
        min-height: 210px;
        padding: 14px;
      }

      .plan-day {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-weight: 850;
      }

      .plan-card ul {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .plan-card li {
        padding: 8px;
        border-radius: var(--radius);
        background: var(--paper-soft);
        color: var(--muted);
        font-size: 13px;
      }

      .resource-tools {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .search-input {
        width: min(380px, 100%);
        min-height: 42px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
        color: var(--ink);
      }

      .search-input:focus,
      .task-input:focus,
      .task-select:focus,
      textarea:focus {
        border-color: var(--red);
        outline: 3px solid rgba(215, 4, 31, 0.13);
      }

      .resource-list {
        display: grid;
        gap: 10px;
      }

      .resource-row {
        display: grid;
        grid-template-columns: 84px minmax(0, 1fr) 118px 112px;
        gap: 12px;
        align-items: center;
        min-height: 70px;
        padding: 14px;
      }

      .resource-row p {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .resource-type {
        color: var(--red);
        font-size: 13px;
        font-weight: 850;
      }

      .resource-date {
        color: var(--muted);
        font-size: 13px;
        font-weight: 750;
      }

      .resource-button,
      .text-button {
        color: var(--red);
        font-weight: 850;
      }

      .review-grid {
        display: grid;
        grid-template-columns: 0.82fr 1.18fr;
        gap: 14px;
      }

      .review-card,
      .note-card {
        padding: 18px;
      }

      .review-score {
        display: grid;
        place-items: center;
        min-height: 260px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper-soft);
      }

      .score-ring {
        display: grid;
        place-items: center;
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background:
          conic-gradient(var(--red) var(--score), #e8edf4 0),
          var(--paper);
      }

      .score-ring-inner {
        display: grid;
        place-items: center;
        width: 132px;
        height: 132px;
        border-radius: 50%;
        background: var(--paper);
      }

      .score-ring strong {
        font-size: 42px;
        line-height: 1;
      }

      .score-ring span {
        color: var(--muted);
        font-size: 13px;
      }

      .note-stack {
        display: grid;
        gap: 12px;
      }

      .note-card textarea {
        width: 100%;
        min-height: 140px;
        resize: vertical;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        color: var(--ink);
        line-height: 1.7;
      }

      .empty-state {
        padding: 24px;
        border: 1px dashed var(--line-strong);
        border-radius: var(--radius);
        color: var(--muted);
        text-align: center;
      }

      .task-dialog {
        width: min(460px, calc(100% - 32px));
        padding: 0;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
        box-shadow: var(--shadow);
      }

      .task-dialog::backdrop {
        background: rgba(17, 24, 39, 0.42);
      }

      .app-modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 120;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(17, 24, 39, 0.54);
        backdrop-filter: blur(8px);
      }

      .app-modal {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        width: min(1120px, 100%);
        max-height: 90vh;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.42);
        border-radius: 18px;
        background: var(--paper);
        box-shadow: 0 28px 70px rgba(17, 24, 39, 0.34);
      }

      .app-modal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.98);
      }

      .app-modal-title {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 12px;
      }

      .app-modal-title p,
      .app-modal-title h2,
      .app-modal-title span {
        margin: 0;
      }

      .app-modal-title p {
        color: var(--red);
        font-size: 12px;
        font-weight: 900;
      }

      .app-modal-title h2 {
        font-size: 22px;
        line-height: 1.2;
      }

      .app-modal-title span {
        display: block;
        margin-top: 3px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 650;
        line-height: 1.45;
      }

      .app-modal-content {
        min-height: 0;
        overflow: auto;
        background: var(--paper-soft);
      }

      .app-modal-content .screen {
        padding: 20px;
      }

      .app-modal-content .embedded-screen {
        padding: 16px;
      }

      .app-modal-content .embedded-frame-wrap {
        min-height: 0;
      }

      .app-modal-content .embedded-frame {
        height: min(720px, calc(90vh - 214px));
        min-height: 620px;
      }

      .dialog-content {
        display: grid;
        gap: 15px;
        padding: 20px;
      }

      .dialog-head,
      .dialog-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 7px;
        color: var(--ink);
        font-size: 13px;
        font-weight: 850;
      }

      .task-input,
      .task-select {
        min-height: 42px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
        color: var(--ink);
      }

      .toast {
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 80;
        max-width: min(360px, calc(100% - 48px));
        padding: 12px 14px;
        border: 1px solid rgba(215, 4, 31, 0.24);
        border-radius: var(--radius);
        background: var(--paper);
        color: var(--ink);
        box-shadow: var(--shadow);
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.18s ease, transform 0.18s ease;
        pointer-events: none;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      .brand-button {
        padding: 0;
        border: 0;
        background: transparent;
        color: var(--ink);
        text-align: left;
        cursor: pointer;
      }

      .brand-button > span:last-child {
        display: grid;
        gap: 3px;
      }

      .brand-subtitle {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 750;
        line-height: 1.2;
      }

      .portal-main {
        min-width: 0;
      }

      .portal-hero {
        align-items: stretch;
      }

      .portal-hero-card {
        display: grid;
        min-width: 190px;
        align-content: center;
        justify-items: start;
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper-soft);
      }

      .portal-hero-card strong {
        color: var(--red);
        font-size: 44px;
        line-height: 1;
      }

      .portal-hero-card span {
        color: var(--muted);
        font-weight: 800;
      }

      .launcher-tools {
        display: grid;
        grid-template-columns: minmax(260px, 0.7fr) minmax(0, 1fr);
        gap: 14px;
        align-items: center;
      }

      .search-shell {
        display: grid;
        grid-template-columns: 20px minmax(0, 1fr);
        align-items: center;
        gap: 10px;
        min-height: 44px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
      }

      .search-shell span {
        color: var(--muted);
      }

      .search-shell input {
        width: 100%;
        min-height: 40px;
        border: 0;
        outline: none;
        background: transparent;
        color: var(--ink);
      }

      .category-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      .category-tab {
        min-height: 36px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        background: var(--paper);
        font-size: 13px;
        font-weight: 850;
      }

      .category-tab.active,
      .category-tab:hover {
        border-color: rgba(215, 4, 31, 0.28);
        color: var(--red);
        background: var(--red-soft);
      }

      .app-card-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .app-card {
        display: grid;
        gap: 14px;
        min-height: 300px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
      }

      .app-card:hover {
        border-color: rgba(215, 4, 31, 0.32);
        box-shadow: var(--shadow);
      }

      .app-card.is-placeholder {
        background: linear-gradient(135deg, var(--paper), #f8fafc);
      }

      .app-card-top,
      .app-card-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .app-card p {
        margin-bottom: 0;
        color: var(--muted);
      }

      .app-card h3 {
        font-size: 24px;
      }

      .app-card-meta {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .recent-strip {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .recent-app {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 66px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
        color: var(--ink);
        font-weight: 850;
        text-align: left;
      }

      .recent-app .module-icon {
        width: 38px;
        height: 38px;
        margin: 0;
        flex: 0 0 auto;
      }

      .rail-link {
        display: grid;
        gap: 3px;
        width: 100%;
        padding: 0;
        border: 0;
        background: transparent;
        color: inherit;
        text-align: left;
      }

      .rail-muted {
        margin-bottom: 0;
        color: var(--muted);
        font-size: 13px;
      }

      .future-board {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .future-card {
        display: grid;
        gap: 12px;
        min-height: 220px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
      }

      .future-card p {
        margin-bottom: 0;
        color: var(--muted);
      }

      .corporate-screen {
        background:
          linear-gradient(180deg, rgba(215, 4, 31, 0.06), rgba(255, 255, 255, 0) 240px),
          #f4f5f7;
      }

      .corporate-mini-header {
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr) 44px;
        align-items: center;
        min-height: 52px;
        border-bottom: 1px solid var(--line);
      }

      .corporate-mini-header strong {
        min-width: 0;
        color: var(--ink);
        font-size: 20px;
        font-weight: 900;
        line-height: 1.25;
        text-align: center;
      }

      .mini-back {
        color: var(--ink);
        font-size: 34px;
        line-height: 1;
      }

      .mini-back.ghost {
        visibility: hidden;
      }

      .corporate-mini-hero {
        min-height: 180px;
        display: flex;
        align-items: center;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.98), rgba(255, 255, 255, 0.78)),
          linear-gradient(135deg, #fff7f7, #f3f4f6);
      }

      .corporate-mini-hero h1 {
        margin-bottom: 8px;
        font-size: clamp(30px, 4vw, 42px);
        line-height: 1.16;
      }

      .service-calligraphy {
        margin-bottom: 8px;
        color: var(--red);
        font-family: "STXingkai", "Xingkai SC", "Kaiti SC", "KaiTi", serif;
        font-size: clamp(34px, 5vw, 48px);
        font-weight: 800;
        letter-spacing: 2px;
        line-height: 1.15;
      }

      .corporate-mini-hero p:last-child,
      .corporate-service-note {
        margin-bottom: 0;
        color: var(--muted);
      }

      .corporate-service-note {
        padding: 14px 16px;
        border: 1px solid rgba(215, 4, 31, 0.16);
        border-radius: var(--radius);
        background: #fffafa;
        color: #6d3439;
        font-size: 14px;
      }

      .corporate-steps {
        display: grid;
        gap: 14px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
      }

      .corporate-steps h2 {
        font-size: 20px;
      }

      .corporate-step-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .corporate-step {
        display: flex;
        min-height: 76px;
        align-items: center;
        gap: 10px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper-soft);
        color: var(--muted);
      }

      .corporate-step span {
        display: inline-flex;
        width: 34px;
        height: 34px;
        flex: 0 0 auto;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
        color: var(--muted);
        font-weight: 900;
      }

      .corporate-step strong {
        min-width: 0;
        font-size: 14px;
        line-height: 1.35;
      }

      .corporate-step.done {
        border-color: rgba(215, 4, 31, 0.2);
        background: var(--red-soft);
        color: var(--ink);
      }

      .corporate-step.done span {
        color: var(--paper);
        border-color: var(--red);
        background: var(--red);
      }

      .corporate-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .choice-panel,
      .corporate-result {
        display: grid;
        gap: 16px;
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
      }

      .choice-panel > p {
        margin-bottom: 0;
        color: var(--muted);
      }

      .choice-grid-portal {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .choice-card-portal {
        display: grid;
        grid-template-columns: minmax(108px, 0.34fr) minmax(0, 1fr);
        gap: 14px;
        min-height: 116px;
        align-content: start;
        align-items: start;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper-soft);
        color: var(--ink);
        text-align: left;
      }

      .choice-card-portal:hover,
      .choice-card-portal.active {
        border-color: rgba(215, 4, 31, 0.36);
        background: var(--red-soft);
      }

      .choice-title {
        color: var(--ink);
        font-size: 17px;
        font-weight: 900;
        line-height: 1.35;
      }

      .choice-desc {
        display: block;
        min-width: 0;
        padding-left: 14px;
        border-left: 1px solid var(--line);
        color: var(--muted);
        font-size: 14px;
        line-height: 1.65;
        overflow-wrap: anywhere;
      }

      .check-choice {
        grid-template-columns: 20px minmax(0, 1fr);
        cursor: pointer;
      }

      .check-choice .choice-copy {
        display: grid;
        grid-template-columns: minmax(108px, 0.34fr) minmax(0, 1fr);
        gap: 14px;
        min-width: 0;
      }

      .check-choice input,
      .corporate-check input {
        accent-color: var(--red);
      }

      .warning-panel {
        border-color: rgba(154, 103, 0, 0.25);
        background: var(--amber-soft);
      }

      .corporate-trail {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .corporate-trail span {
        display: inline-flex;
        min-height: 30px;
        align-items: center;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        background: var(--paper);
        font-size: 13px;
        font-weight: 850;
      }

      .corporate-trail span.done {
        color: var(--red);
        border-color: rgba(215, 4, 31, 0.2);
        background: var(--red-soft);
      }

      .corporate-progress {
        display: grid;
        gap: 8px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper-soft);
      }

      .corporate-groups {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .corporate-group,
      .corporate-notes {
        display: grid;
        gap: 12px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper-soft);
      }

      .corporate-checklist {
        display: grid;
        gap: 10px;
      }

      .corporate-check {
        display: grid;
        grid-template-columns: 20px minmax(0, 1fr);
        gap: 10px;
        align-items: start;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
        font-size: 14px;
        font-weight: 750;
      }

      .material-copy {
        display: grid;
        gap: 6px;
        min-width: 0;
      }

      .material-title {
        color: var(--ink);
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      .material-note {
        display: block;
        padding-top: 6px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-weight: 650;
        line-height: 1.55;
        overflow-wrap: anywhere;
      }

      .corporate-notes p {
        margin-bottom: 0;
        color: var(--muted);
      }

      .embedded-screen {
        padding: 18px;
      }

      .embedded-frame-wrap {
        overflow: hidden;
        min-height: 760px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
      }

      .embedded-frame {
        display: block;
        width: 100%;
        min-height: 760px;
        height: calc(100vh - 190px);
        border: 0;
        background: var(--paper);
      }

      [data-density="compact"] .screen {
        gap: 14px;
        padding: 18px;
      }

      [data-density="compact"] .task-card,
      [data-density="compact"] .resource-row {
        min-height: 58px;
        padding: 10px 12px;
      }

      @media (max-width: 1180px) {
        :root {
          --sidebar: 220px;
          --aside: 320px;
        }

        .app-shell {
          grid-template-columns: var(--sidebar) minmax(0, 1fr);
        }

        .portal-shell {
          grid-template-columns: minmax(0, 1fr);
          width: min(1120px, calc(100% - 32px));
        }

        .right-rail {
          grid-column: 1 / -1;
          position: static;
          grid-template-columns: repeat(3, minmax(0, 1fr));
          max-height: none;
        }

        .metric-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 860px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
          padding: 16px;
        }

        .brand,
        .topbar-actions {
          min-width: 0;
        }

        .topbar-center {
          justify-content: flex-start;
          width: 100%;
        }

        .app-shell {
          grid-template-columns: 1fr;
          width: min(100% - 24px, 1500px);
        }

        .portal-shell {
          width: min(100% - 24px, 1120px);
        }

        .sidebar {
          position: static;
          max-height: none;
        }

        .app-modal-backdrop {
          align-items: stretch;
          padding: 10px;
        }

        .app-modal {
          width: 100%;
          height: calc(100dvh - 20px);
          max-height: none;
          border-radius: 14px;
        }

        .app-modal-head {
          align-items: flex-start;
          padding: 12px;
        }

        .app-modal-title {
          align-items: flex-start;
        }

        .app-modal-title .module-icon {
          width: 38px;
          height: 38px;
        }

        .app-modal-title h2 {
          font-size: 19px;
        }

        .app-modal-title span {
          font-size: 12px;
        }

        .app-modal-content .screen {
          padding: 16px;
        }

        .app-modal-content .embedded-frame {
          height: calc(100dvh - 172px);
          min-height: 580px;
        }

        .nav-section {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .focus-card {
          grid-template-columns: 1fr;
        }

        .content-grid,
        .review-grid,
        .weekly-grid,
        .right-rail,
        .future-board {
          grid-template-columns: 1fr;
        }

        .task-card {
          grid-template-columns: 28px minmax(0, 1fr);
        }

        .task-card > .status-pill,
        .task-card > .progress-cell,
        .task-card > .resource-button {
          grid-column: 2;
        }

        .task-card > .resource-button {
          justify-self: start;
        }

        .resource-tools,
        .screen-header,
        .block-head,
        .portal-hero,
        .corporate-toolbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .resource-row {
          grid-template-columns: 1fr;
        }

        .launcher-tools {
          grid-template-columns: 1fr;
        }

        .category-tabs {
          justify-content: flex-start;
        }

        .app-card-grid,
        .choice-grid-portal,
        .corporate-groups,
        .recent-strip {
          grid-template-columns: 1fr;
        }

        .corporate-step-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 560px) {
        h1 {
          font-size: 34px;
        }

        .screen {
          padding: 16px;
        }

        .nav-section {
          grid-template-columns: 1fr;
        }

        .metric-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .brand-code {
          font-size: 24px;
        }

        .brand-title {
          font-size: 20px;
        }

        .portal-hero-card {
          width: 100%;
          min-width: 0;
        }

        .corporate-mini-hero {
          min-height: 164px;
          padding: 22px;
        }

        .corporate-step-grid {
          grid-template-columns: 1fr;
        }

        .choice-card-portal,
        .check-choice .choice-copy {
          grid-template-columns: 1fr;
        }

        .choice-card-portal {
          min-height: auto;
        }

        .choice-desc {
          padding-top: 8px;
          padding-left: 0;
          border-top: 1px solid var(--line);
          border-left: 0;
        }

        .embedded-screen {
          padding: 12px;
        }

        .embedded-frame-wrap,
        .embedded-frame {
          min-height: 720px;
        }

        .app-modal-content .embedded-frame-wrap,
        .app-modal-content .embedded-frame {
          min-height: 0;
        }

        .app-modal-content .embedded-frame {
          height: calc(100dvh - 168px);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
    <script src="app-manifest.browser.js"></script>
    <script type="text/babel" src="data.jsx"></script>
    <script type="text/babel" src="corporate-materials.jsx"></script>
    <script src="remote-content.js"></script>
    <script type="text/babel" src="icons.jsx"></script>
    <script type="text/babel" src="app.jsx"></script>
  </body>
</html>
